services:
  app:
    build: .
    container_name: ai-document-analyzer
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai-network
    # Pull the Mistral model on first run
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull mistral &&
             wait"

volumes:
  ollama_data:

networks:
  ai-network:
    driver: bridge
